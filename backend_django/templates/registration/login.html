{% extends "base.html" %}

{% block title %}Login Operasional{% endblock %}

{% block content %}
  <div class="login-shell">
    <div class="login-stage">
      <div class="login-brand" tabindex="0">PICTORIAL</div>

      <div class="card login-card">
        <div class="stack">
          <h2>Login Operasional</h2>
          <p class="muted">Gunakan akun operator untuk masuk ke dashboard produksi.</p>
        </div>

        <form method="post">
          {% csrf_token %}
          <div class="form-grid" style="grid-template-columns: 1fr;">
            {% for field in form %}
              <div class="field">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
              </div>
            {% endfor %}
          </div>
          <div class="actions" style="margin-top: 18px;">
            <button type="submit" class="primary">Masuk</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
