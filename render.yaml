databases:
  - name: laser-job-logger-db
    plan: free
    databaseName: laser_job_logger
    user: laser_job_logger
    ipAllowList: []

services:
  - type: web
    name: laser-job-logger-django
    runtime: python
    rootDir: backend_django
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate && python manage.py seed_defaults
    startCommand: gunicorn config.wsgi:application --log-file -
    healthCheckPath: /up/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: laser-job-logger-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: operator
      - key: DJANGO_SUPERUSER_EMAIL
        value: operator@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
